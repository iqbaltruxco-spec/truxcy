<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>truxcy</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-header__brand">
        <img
          src="assets/truxco-logo.png"
          alt="Truxco"
          class="app-header__logo"
        >
        <div class="app-header__titles">
          <h1 class="app-header__title">Truxcy</h1>
          <p class="app-header__credit">developed by truxco technologies</p>
        </div>
      </div>

      <div class="app-header__actions">
        <button type="button" id="clear-chat-button" class="btn btn--outline">
          Clear Chat
        </button>
        <button type="button" id="reload-page-button" class="btn btn--outline">
          Reload Page
        </button>
      </div>
    </header>

    <main class="app-main">
      <section class="chat-panel" aria-label="Conversation">
        <div id="chat-messages" class="chat-panel__messages">
          <div class="chat-welcome">
            <div class="chat-welcome__bot" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="bot-icon">
                <rect x="5" y="8" width="14" height="11" rx="3"></rect>
                <circle cx="9.5" cy="13" r="1.2"></circle>
                <circle cx="14.5" cy="13" r="1.2"></circle>
                <path d="M12 4v3"></path>
                <circle cx="12" cy="3" r="1.2"></circle>
                <path d="M5 12H3M21 12h-2"></path>
              </svg>
            </div>
            <p class="chat-welcome__text">
              Hi, I am <strong>truxcy</strong>. Ask me anything .
            </p>
          </div>
        </div>
      </section>

      <footer class="chat-input">
        <form id="chat-form" class="chat-input__form">
          <input
            type="text"
            id="question-input"
            class="chat-input__field"
            placeholder="Type your message here..."
            autocomplete="off"
            required
          >
          <button type="submit" id="send-button" class="btn btn--primary chat-input__button">
            <span class="chat-input__button-text">Send</span>
            <span class="chat-input__button-loader" aria-hidden="true"></span>
          </button>
        </form>
      </footer>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
